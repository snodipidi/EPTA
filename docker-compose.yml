# ─────────────────────────────────────────────────────────────
# EPTA — local development orchestration.
#
#   docker compose up -d postgres redis      # just the infra
#   docker compose up --build backend        # infra + API
#   docker compose --profile storage up -d   # + MinIO (S3-compatible)
#
# The `minio` and future `python-*` services live behind compose
# profiles so the default `up` stays lean.
# ─────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: epta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-epta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-epta_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-epta}
    ports:
      - "5432:5432"
    volumes:
      - epta_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-epta} -d ${POSTGRES_DB:-epta}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: epta-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - epta_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: epta-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      DATABASE_URL: postgresql://${POSTGRES_USER:-epta}:${POSTGRES_PASSWORD:-epta_dev_password}@postgres:5432/${POSTGRES_DB:-epta}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret_change_me}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900s}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_me}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-30d}
      # ── Auth flow: where to redirect the browser back after OAuth, and the
      #    email-verification code lifetime (seconds). ──
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      EMAIL_CODE_TTL: ${EMAIL_CODE_TTL:-900}
      # ── Google OAuth (blank = Google sign-in disabled, app still boots). ──
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3000/api/auth/google/callback}
      # ── Mail / SMTP (blank = dev transport: codes are written to the logs). ──
      MAIL_FROM: ${MAIL_FROM:-EPTA <no-reply@epta.dev>}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      # ── Python micro-services. Пусто = клиент молчит (graceful no-op, без таймаутов).
      #    Чтобы включить, задай URL в корневом .env и подними `--profile python`.
      #    Внутри compose-сети сервисы доступны по имени: http://recommendation:8000 и т.д.
      PY_RECOMMENDATION_URL: ${PY_RECOMMENDATION_URL:-}
      PY_MODERATION_URL: ${PY_MODERATION_URL:-}
      PY_ANALYTICS_URL: ${PY_ANALYTICS_URL:-}
      PY_SEARCH_URL: ${PY_SEARCH_URL:-}
      PY_SERVICE_TIMEOUT_MS: ${PY_SERVICE_TIMEOUT_MS:-4000}
    ports:
      - "3000:3000"
    # Run migrations, then boot. Keeps schema in sync on every deploy.
    command: sh -c "npx prisma migrate deploy && node dist/main"

  # ── Object storage (S3-compatible). Enable with: --profile storage ──
  minio:
    image: minio/minio:latest
    container_name: epta-minio
    profiles: ["storage"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    volumes:
      - epta_miniodata:/data

  # ── Python micro-services (recommendation / moderation / search / analytics).
  #    Каркас FastAPI-сервисов в ./python-services. Живут за профилем `python`,
  #    чтобы дефолтный `up` оставался лёгким:
  #        docker compose --profile python up -d --build
  #    Внутри сети адресуются по имени сервиса (http://recommendation:8000 и т.д.);
  #    наружу проброшены на 8001..8004 для отладки.
  #
  #    Общий блок настроек (DATABASE_URL уже в async-форме для asyncpg, REDIS_URL,
  #    профиль, зависимости, healthcheck) вынесен в YAML-якорь ниже.
  recommendation: &python-service
    build:
      context: ./python-services
      dockerfile: recommendation/Dockerfile
    image: epta-recommendation
    container_name: epta-recommendation
    profiles: ["python"]
    restart: unless-stopped
    environment: &python-env
      SERVICE_NAME: recommendation
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-epta}:${POSTGRES_PASSWORD:-epta_dev_password}@postgres:5432/${POSTGRES_DB:-epta}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${PY_LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8000"
    healthcheck: &python-healthcheck
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health/live').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5

  moderation:
    <<: *python-service
    build:
      context: ./python-services
      dockerfile: moderation/Dockerfile
    image: epta-moderation
    container_name: epta-moderation
    environment:
      <<: *python-env
      SERVICE_NAME: moderation
    ports:
      - "8002:8000"

  search:
    <<: *python-service
    build:
      context: ./python-services
      dockerfile: search/Dockerfile
    image: epta-search
    container_name: epta-search
    environment:
      <<: *python-env
      SERVICE_NAME: search
    ports:
      - "8003:8000"

  analytics:
    <<: *python-service
    build:
      context: ./python-services
      dockerfile: analytics/Dockerfile
    image: epta-analytics
    container_name: epta-analytics
    environment:
      <<: *python-env
      SERVICE_NAME: analytics
    ports:
      - "8004:8000"

  # ── Telegram-бот (aiogram + pyrogram). Каркас в ./python-services/bot.
  #    Долгоживущий процесс: по умолчанию long-polling. Все «включающие» env пусты —
  #    без BOT_TOKEN бот не стартует диспетчер, но контейнер и /health работают.
  #    Наружу проброшен на 8005 (health/webhook/internal API), внутри сети — 8000.
  bot:
    <<: *python-service
    build:
      context: ./python-services
      dockerfile: bot/Dockerfile
    image: epta-bot
    container_name: epta-bot
    environment:
      <<: *python-env
      SERVICE_NAME: bot
      # ── Telegram Bot API (aiogram). Пусто = бот не ходит в Telegram. ──
      BOT_TOKEN: ${BOT_TOKEN:-}
      BOT_MODE: ${BOT_MODE:-polling}
      BOT_WEBHOOK_URL: ${BOT_WEBHOOK_URL:-}
      BOT_WEBHOOK_SECRET: ${BOT_WEBHOOK_SECRET:-}
      # ── Pyrogram MTProto-юзербот (опционально, доп. возможности сверх Bot API). ──
      PYROGRAM_API_ID: ${PYROGRAM_API_ID:-0}
      PYROGRAM_API_HASH: ${PYROGRAM_API_HASH:-}
      PYROGRAM_SESSION_STRING: ${PYROGRAM_SESSION_STRING:-}
      # ── Исходящие вызовы к backend (NestJS REST). Внутри сети backend на :3000. ──
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:3000/api}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
    ports:
      - "8005:8000"

volumes:
  epta_pgdata:
  epta_redisdata:
  epta_miniodata:
